# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Bind workspace 1 to the physical-left monitor (serial 9QJZP83), matched by
# description so it is independent of which DP port the cable uses.
workspace = 1, monitor:desc:Dell Inc. DELL S2721DGF 9QJZP83
# Bind workspace 4 (Slack + Vesktop) to the physical-right monitor (serial 477KT83).
workspace = 4, monitor:desc:Dell Inc. DELL S2721DGF 477KT83

# No Gaps when there is only one Window in a Workspace
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]
# ---

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Prevent X11 app (like Steam) being scaled by Wayland, which would introduce blur
xwayland {
    force_zero_scaling = true
}

windowrule {
    name = hyprshot-gui
    match:title = Hyprshot
    float = yes
    move = monitor_w-window_w-5 36
}

# Assign applications to Workspaces
# class can be found using: hyprctl clients | grep class

windowrule {
    name = google-chrome
    match:class = ^(google-chrome)$
    workspace = 1
}

windowrule {
    name = phpstorm
    match:class = ^(jetbrains-phpstorm)$
    workspace = 2
}

windowrule {
    name = steam
    match:class = ^(steam)$
    workspace = 6
}

windowrule {
    name = vesktop
    match:class = ^(vesktop)$
    workspace = 4
    no_initial_focus = on
}

windowrule {
    name = slack
    match:class = ^(Slack)$
    workspace = 4
    no_initial_focus = on
}
